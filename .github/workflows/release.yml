name: Release

# Builds an sdist + wheel on every tag of the form `vX.Y.Z[aN|bN|rcN]`,
# uploads them to a GitHub Release, then publishes to PyPI via OIDC
# trusted publishing (no API token required on the repo side).
#
# See docs/releasing.md for the maintainer workflow.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  # Serialize releases and never cancel one mid-flight: a second tag pushed while
  # a release is publishing waits its turn instead of racing the PyPI upload.
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # for creating the GitHub Release + attaching artifacts
  id-token: write   # for PyPI OIDC trusted publishing

# Opt every JavaScript action into the Node.js 24 runtime. Node 20 is
# deprecated and forced off on 2026-06-02; this env var is GitHub's
# documented way to migrate early — version-agnostic, so it covers
# both first-party (`actions/*`) and third-party actions without
# pinning each to a Node-24 major.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build the webui SPA
        # Build the SPA explicitly with npm so durin/web/dist/ is
        # populated BEFORE the wheel build. We use npm, not bun: bun's
        # rollup optional-deps resolution is flaky on CI. The wheel's
        # `artifacts` config force-includes the resulting dist even
        # though it's VCS-ignored.
        run: |
          cd webui
          npm install
          npm run build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build

      - name: Verify version matches the tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJECT_VERSION=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$TAG"
          echo "pyproject=$PROJECT_VERSION"
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match pyproject version ($PROJECT_VERSION). Bump pyproject.toml before tagging."
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          # PEP 440 pre-releases contain a/b/rc/dev.
          if echo "$TAG" | grep -Eq '(a|b|rc|dev)[0-9]+'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sdist + wheel
        # `--sdist --wheel` builds each from the source tree directly
        # (not sdist→wheel), so the freshly-built durin/web/dist/ is
        # present for the wheel. DURIN_SKIP_WEBUI_BUILD=1 stops the
        # hatch hook from rebuilding it (we already did, with npm).
        run: DURIN_SKIP_WEBUI_BUILD=1 python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
          generate_release_notes: true
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Skip cleanly if PyPI trusted publishing isn't configured yet.
    # The GitHub Release in the sibling job is still produced.
    continue-on-error: true
    environment:
      name: pypi
      url: https://pypi.org/p/durin-agent
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
