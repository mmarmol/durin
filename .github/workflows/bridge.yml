name: bridge

# Vet + test + cross-compile the WhatsApp Go bridge. Not a required status
# check (unlike test/webui), so a plain path filter is fine: the job simply
# does not run for diffs that cannot affect bridge/.

on:
  pull_request:
    paths:
      - "bridge/**"
      - "durin/channels/whatsapp_bridge.py"
      - "durin/channels/bridge_checksums.json"
      - ".github/workflows/bridge.yml"
  push:
    branches:
      - main
    paths:
      - "bridge/**"
      - "durin/channels/whatsapp_bridge.py"
      - "durin/channels/bridge_checksums.json"
      - ".github/workflows/bridge.yml"

concurrency:
  group: bridge-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"
          cache-dependency-path: bridge/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Cross-compile all release targets and verify the checksum pin
        working-directory: ${{ github.workspace }}
        run: |
          # Build every target with the exact release flags and version, then
          # assert the results match the committed pin. This keeps
          # bridge_checksums.json honest against the bridge source on every PR
          # that touches either — a version bump without regenerating the pin
          # (scripts/gen-bridge-checksums.sh) fails here instead of silently at
          # bridge-release time.
          VERSION=$(sed -n 's/^BRIDGE_VERSION = "\(.*\)"/\1/p' \
            durin/channels/whatsapp_bridge.py)
          mkdir -p dist-bridge
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${target%/*}"; GOARCH="${target#*/}"
            out="dist-bridge/durin-whatsapp-bridge-${GOOS}-${GOARCH}"
            (cd bridge && GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 \
              go build -trimpath -buildvcs=false \
                -ldflags "-s -w -X main.version=${VERSION}" -o "../$out" .)
            echo "built $target"
          done
          python3 - <<'EOF'
          import hashlib, json, pathlib, sys
          pin = json.loads(
              pathlib.Path("durin/channels/bridge_checksums.json").read_text()
          )["sha256"]
          built = {
              p.name: hashlib.sha256(p.read_bytes()).hexdigest()
              for p in pathlib.Path("dist-bridge").glob("durin-whatsapp-bridge-*")
          }
          if built != pin:
              print("::error::bridge_checksums.json is stale for BRIDGE_VERSION. "
                    "Run scripts/gen-bridge-checksums.sh and commit the result.")
              sys.exit(1)
          print("Checksum pin matches the bridge source.")
          EOF
