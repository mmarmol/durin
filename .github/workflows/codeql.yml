name: CodeQL

# Advanced CodeQL setup (replaces default setup) so we can exclude tests/ via the
# config file — default setup doesn't support path filters. Languages match what
# default setup scanned: actions, javascript-typescript, python (all interpreted, so
# no autobuild step is needed).
#
# Triggers: push-to-main (the authoritative scan that feeds the Security tab's
# default-branch baseline) + a weekly cron (catches newly-published CVEs in code
# that hasn't changed). No pull_request trigger: a PR's code is scanned seconds
# later by the push-to-main run on merge, so a per-PR scan only duplicates it.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 5 * * 1" # weekly, Mondays 05:23 UTC

concurrency:
  group: codeql-${{ github.ref }}
  # Never cancel an in-flight scan: push-to-main and the weekly cron share this
  # group, and each baseline scan should complete rather than be pre-empted.
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript
          - python
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
