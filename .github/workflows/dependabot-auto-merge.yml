name: dependabot-auto-merge

# Auto-merge Dependabot patch/minor bumps once their required checks pass, so
# routine low-risk updates don't need manual handling. Major bumps are always
# left for human review (CI still runs on them). Pairs with the dependabot
# `groups:` config: a grouped PR auto-merges only if *every* member is patch/minor.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Dependabot's commit message names every bump as "from X to Y" — in the
      # headline for single bumps, and one "Updates `dep` from X to Y" line per
      # member for grouped PRs. Compare the major component of each pair
      # ourselves (no third-party action — the actions allowlist only permits
      # actions/*). Dependabot used to embed `update-type:
      # version-update:semver-<level>` lines and this job matched those, but
      # that metadata was dropped from commit messages (its absence silently
      # sent every bump to manual review), so the version pairs are now the
      # source of truth. Enable auto-merge only when every pair keeps the same
      # major; any major change, or an unparsable pair, falls through to
      # manual review.
      - name: Enable auto-merge for patch/minor bumps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pairs=$(git log -1 --format=%B "$HEAD_SHA" \
                  | grep -oiE 'from v?[0-9][0-9A-Za-z.+-]* to v?[0-9][0-9A-Za-z.+-]*' || true)
          echo "Version pairs in this PR: ${pairs:-<none found>}"
          if [ -z "$pairs" ]; then
            echo "No version pairs found — leaving for manual review."
            exit 0
          fi
          verdict=auto
          while IFS= read -r p; do
            from_major=$(echo "$p" | awk '{print $2}' | sed 's/^v//; s/[^0-9].*$//')
            to_major=$(echo "$p" | awk '{print $4}' | sed 's/^v//; s/[^0-9].*$//')
            if [ -z "$from_major" ] || [ -z "$to_major" ] || [ "$from_major" != "$to_major" ]; then
              verdict=manual
            fi
          done < <(printf '%s\n' "$pairs")
          if [ "$verdict" = "manual" ]; then
            echo "Contains a major (or unparsable) bump — leaving for manual review."
            exit 0
          fi
          echo "All same-major bumps — enabling auto-merge (squash)."
          gh pr merge --auto --squash "$PR_URL"
