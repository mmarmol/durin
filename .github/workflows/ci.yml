name: CI

# Run the test suite on every PR and on pushes to main.
# Keep this fast and focused — the goal is "don't ship broken main";
# heavier integration tests can live in a separate workflow if needed.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs only on PRs (a new push obsoletes the old one).
  # On push-to-main let every run finish, so each merged commit keeps its own
  # pass/fail signal instead of being cancelled by the next merge.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Opt JavaScript actions into Node.js 24 (Node 20 is deprecated and
# forced off on 2026-06-02). See release.yml for the rationale.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # The Python suite can only be affected by Python sources, deps, or this
      # workflow itself. Skip the (slow) install+pytest for PRs that touch only
      # the webui, docs, LICENSE, or the release/catalog workflows. The job still
      # runs and reports success, so it keeps satisfying the required status
      # check — a path-filtered `on:` would instead leave the check unreported
      # and block the PR. Defaults to running whenever the diff can't be
      # computed, so a "skip" never happens by accident.
      - name: Detect Python-relevant changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only "${base}...HEAD" 2>/dev/null) || files=""
          if [ -z "$files" ]; then
            echo "Diff unavailable/empty — running the suite to be safe."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif echo "$files" | grep -qE '(\.py$|^pyproject\.toml$|^uv\.lock$|^tests/|^\.github/workflows/ci\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Python-relevant changes — skipping the Python suite:"
            echo "$files" | sed 's/^/  /'
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.run == 'true'
        with:
          python-version: "3.11"
          cache: pip

      - name: Install durin + dev + all lightweight extras
        if: steps.filter.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          # Skip the webui bundle — CI doesn't need it and it would force
          # bun/npm onto the runner just for tests.
          # Install every optional extra except `[local]` (llama-cpp-python
          # is huge and platform-specific) and `[memory]` (fastembed
          # downloads ~2GB models). Tests that need those self-skip via
          # `pytest.importorskip` when they're absent.
          DURIN_SKIP_WEBUI_BUILD=1 pip install -e ".[dev,mcp,web,oauth,slack,discord]"

      - name: Run unit tests
        if: steps.filter.outputs.run == 'true'
        run: pytest tests/ -q --maxfail=5
