<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>durin · Memoria — interaction mockup</title>
<style>
  :root {
    --bg: #fbfbfa;
    --panel: #ffffff;
    --ink: #1c1c1a;
    --muted: #6b6b66;
    --line: #e6e5e1;
    --topic: #2faf6a;
    --session: #6b7280;
    --reference: #d9952b;
    --accent: #5b56e0;
    --lit: #1c1c1a;
    --dim: #d7d6d2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font: 14px/1.5 -apple-system, system-ui, sans-serif; color: var(--ink); background: var(--bg); }
  .app { display: flex; height: 100vh; }

  /* left rail (context only) */
  .rail { width: 180px; border-right: 1px solid var(--line); padding: 12px; flex-shrink: 0; background: var(--panel); }
  .rail .brand { font-weight: 700; margin-bottom: 16px; }
  .rail .nav { font-size: 13px; color: var(--muted); }
  .rail .nav .on { color: var(--ink); font-weight: 600; background: #f1f0ec; border-radius: 6px; padding: 4px 8px; display: inline-block; }

  /* main */
  .main { flex: 1; position: relative; min-width: 0; }
  .topbar { height: 46px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; padding: 0 14px; background: var(--panel); position: relative; z-index: 5; }
  .topbar .title { font-weight: 600; }
  .topbar .stats { color: var(--muted); font-size: 12px; }
  .topbar .search { margin-left: auto; width: 300px; }
  .topbar .search input { width: 100%; height: 30px; border: 1px solid var(--line); border-radius: 8px; padding: 0 10px; font: inherit; outline: none; }
  .topbar .search input:focus { border-color: var(--accent); }
  .backbtn { display: none; border: 1px solid var(--line); background: var(--panel); border-radius: 6px; padding: 3px 8px; font-size: 12px; color: var(--accent); cursor: pointer; }

  .stage { position: absolute; inset: 46px 0 0 0; overflow: hidden; }

  /* graph */
  svg.edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .node { position: absolute; transform: translate(-50%, -50%); cursor: pointer; text-align: center; transition: opacity .18s ease; }
  .node .dot { width: 18px; height: 18px; border-radius: 50%; margin: 0 auto 4px; box-shadow: 0 0 0 0 rgba(91,86,224,0); transition: box-shadow .18s ease, transform .12s ease; }
  .node.t-topic .dot { background: var(--topic); }
  .node.t-session .dot { background: var(--session); }
  .node .label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .node.lit .label { color: var(--ink); font-weight: 600; }
  .node.lit .dot { box-shadow: 0 0 0 4px rgba(91,86,224,.18); }
  .node.dim { opacity: .22; }
  .node.active .dot { transform: scale(1.25); box-shadow: 0 0 0 5px rgba(91,86,224,.28); }
  svg .edge { stroke: #cfcec9; stroke-width: 1.2; transition: stroke .18s, opacity .18s; }
  svg .edge.lit { stroke: var(--accent); opacity: .8; }
  svg .edge.dim { opacity: .12; }

  /* hover preview popover */
  .preview { position: absolute; z-index: 30; width: 250px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.10); padding: 10px; font-size: 12px; pointer-events: none; display: none; }
  .preview .h { display: flex; gap: 6px; align-items: center; font-weight: 600; margin-bottom: 4px; }
  .preview .h .d { width: 8px; height: 8px; border-radius: 50%; }
  .preview .body { color: var(--muted); display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; }

  /* THE single content panel (entity / reference / entry all use it) */
  .panel { position: absolute; top: 12px; right: 12px; bottom: 12px; width: 380px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.12); display: none; flex-direction: column; z-index: 20; transition: width .18s ease; }
  .panel.open { display: flex; }
  .panel.wide { width: calc(100% - 24px); }
  .panel header { display: flex; gap: 8px; align-items: flex-start; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  .panel header .d { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .panel header .ttl { font-weight: 600; }
  .panel header .sub { font-size: 12px; color: var(--muted); }
  .panel header .sp { margin-left: auto; display: flex; gap: 4px; }
  .panel header button { border: none; background: none; cursor: pointer; color: var(--muted); border-radius: 6px; padding: 3px 6px; font-size: 13px; }
  .panel header button:hover { background: #f1f0ec; }
  .panel .tabs { display: flex; gap: 4px; flex-wrap: wrap; padding: 6px 10px; border-bottom: 1px solid var(--line); font-size: 12px; }
  .panel .tabs button { border: none; background: none; cursor: pointer; color: var(--muted); padding: 3px 8px; border-radius: 6px; }
  .panel .tabs button.on { background: rgba(91,86,224,.12); color: var(--accent); }
  .panel .content { padding: 12px; overflow: auto; font-size: 13px; }
  .panel .content h1 { font-size: 18px; margin: 0 0 8px; }
  .panel .content h2 { font-size: 15px; margin: 14px 0 6px; }
  .panel .content p { margin: 0 0 8px; }
  .panel .content ul { margin: 0 0 8px 18px; padding: 0; }

  /* search results */
  .results { position: absolute; top: 12px; left: 12px; bottom: 12px; width: 300px; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.10); display: none; flex-direction: column; z-index: 15; }
  .results.open { display: flex; }
  .results .rh { padding: 9px 12px; border-bottom: 1px solid var(--line); font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; }
  .results .rh .x { cursor: pointer; color: var(--muted); }
  .results .list { overflow: auto; }
  .results .item { padding: 10px 12px; border-top: 1px solid var(--line); cursor: pointer; }
  .results .item:hover { background: #f6f5f2; }
  .results .item:first-child { border-top: none; }
  .results .kind { font-size: 10px; text-transform: uppercase; letter-spacing: .04em; border-radius: 4px; padding: 1px 5px; }
  .results .kind.canonical { background: rgba(47,175,106,.16); color: #1f7a4a; }
  .results .kind.reference { background: rgba(217,149,43,.16); color: #9a6712; }
  .results .item .t { font-weight: 600; margin-left: 6px; }
  .results .item .s { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .legend { position: absolute; left: 14px; bottom: 12px; font-size: 11px; color: var(--muted); display: flex; gap: 12px; z-index: 4; }
  .legend i { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .hint { position: absolute; right: 14px; bottom: 12px; font-size: 11px; color: var(--muted); z-index: 4; max-width: 360px; text-align: right; }
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">durin</div>
    <div class="nav"><div class="on">▣ Memoria</div><div style="margin-top:8px">✦ Skills</div></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="title">Memoria</span>
      <span class="stats" id="stats">5 nodos · 4 enlaces</span>
      <button class="backbtn" id="backbtn">← Grafo completo</button>
      <div class="search"><input id="search" placeholder="Buscar en memoria…" autocomplete="off" /></div>
    </div>

    <div class="stage" id="stage">
      <svg class="edges" id="edges"></svg>
      <!-- nodes injected by JS -->

      <div class="preview" id="preview">
        <div class="h"><span class="d"></span><span id="pv-title"></span></div>
        <div class="body" id="pv-body"></div>
      </div>

      <!-- search results (left) -->
      <aside class="results" id="results">
        <div class="rh"><span id="rh-count">Search</span><span class="x" id="results-x">✕</span></div>
        <div class="list" id="results-list"></div>
      </aside>

      <!-- THE single content panel (right) -->
      <aside class="panel" id="panel">
        <header>
          <span class="d" id="pn-dot"></span>
          <div style="min-width:0">
            <div class="ttl" id="pn-title"></div>
            <div class="sub" id="pn-sub"></div>
          </div>
          <div class="sp">
            <button id="pn-wide" title="Ancho completo">⤢</button>
            <button id="pn-close" title="Cerrar (restaura el grafo)">✕</button>
          </div>
        </header>
        <div class="tabs" id="pn-tabs"></div>
        <div class="content" id="pn-content"></div>
      </aside>

      <div class="legend"><span><i style="background:var(--topic)"></i>topic</span><span><i style="background:var(--session)"></i>session</span></div>
      <div class="hint" id="hint">Hover = resaltar + preview · Click = abrir · ✕ = volver al grafo previo</div>
    </div>
  </main>
</div>

<script>
// ---- fake data ----------------------------------------------------------
const NODES = [
  { id:"topic:reaccion-adversa", type:"topic", name:"Reacción Adversa Vacuna Rabia", x:.52, y:.46,
    body:`<h1>Reacción Adversa Vacunal</h1><p>Investigación clínica sobre reacciones adversas postvacunales (angioedema y urticaria) en caninos. Caso: Teckel hembra de 5 años vacunada con Zoetis.</p><h2>Mecanismo</h2><p>Hipersensibilidad tipo I (IgE) con desgranulación de mastocitos.</p><h2>Protocolo</h2><ul><li>Prednisolona 0.5-1 mg/kg IM/IV</li><li>Difenhidramina 2-4 mg/kg IM</li></ul>` },
  { id:"topic:veterinaria-clinica", type:"topic", name:"Veterinaria Clínica", x:.34, y:.34,
    body:`<h1>Veterinaria Clínica Canina</h1><p>Dominio de conocimiento clínico veterinario para caninos.</p>` },
  { id:"topic:zoetis-vacuna", type:"topic", name:"Zoetis (vacuna)", x:.40, y:.62,
    body:`<h1>Zoetis — Vacuna Rabia</h1><p>Marca de la vacuna implicada en el caso de referencia.</p>` },
  { id:"session:ws-2db", type:"session", name:"necesito que… podamos…", x:.70, y:.40,
    body:`<h1>Sesión websocket_2db…</h1><p>Conversación donde se creó la entidad (turno 8). 61 mensajes.</p>` },
  { id:"session:cron-dream", type:"session", name:"The schedule… this re…", x:.64, y:.66,
    body:`<h1>Sesión cron_dream</h1><p>Consolidación nocturna.</p>` },
];
const EDGES = [
  ["topic:reaccion-adversa","topic:veterinaria-clinica"],
  ["topic:reaccion-adversa","topic:zoetis-vacuna"],
  ["topic:reaccion-adversa","session:ws-2db"],
  ["topic:reaccion-adversa","session:cron-dream"],
];
// reference docs are NOT graph nodes — only reachable via search
const REFERENCES = [
  { id:"reference:reaccion-adversa-investigacion", name:"reaccion-adversa-…-investigacion",
    body:`<h1>Reacción Adversa Vacunal: Angioedema y Urticaria</h1><p><b>Caso clínico de referencia</b></p><ul><li>Paciente: Teckel hembra, 5 años</li><li>Vacuna: Rabia (Zoetis)</li></ul><h2>1. Fisiopatología</h2><p>El angioedema postvacunal resulta de una hipersensibilidad tipo I (IgE)…</p><h2>Fuentes</h2><p>Ford RB (Today's Veterinary Practice), Moore GE (JAVMA 2005), MSD Veterinary Manual.</p>` },
];
const TABS_ENTITY = ["Info","Contenido","Entradas","Procedencia","History","Sources","Archive"];
const TABS_REFERENCE = ["Contenido"];

// ---- state --------------------------------------------------------------
let openNodeId = null;     // what the panel currently shows (node id or reference id)
let egoTemporary = false;  // true if we loaded an off-graph node and must restore on close

const stage = document.getElementById("stage");
const edgesSvg = document.getElementById("edges");
const preview = document.getElementById("preview");
const panel = document.getElementById("panel");
const results = document.getElementById("results");
const colorByType = { topic:"var(--topic)", session:"var(--session)", reference:"var(--reference)" };

function nodeEl(id){ return document.querySelector(`.node[data-id="${CSS.escape(id)}"]`); }
function neighbors(id){
  const s = new Set([id]);
  for(const [a,b] of EDGES){ if(a===id) s.add(b); if(b===id) s.add(a); }
  return s;
}

// ---- render graph -------------------------------------------------------
function layout(){
  const w = stage.clientWidth, h = stage.clientHeight;
  for(const n of NODES){
    let el = nodeEl(n.id);
    if(!el){
      el = document.createElement("div");
      el.className = `node t-${n.type}`;
      el.dataset.id = n.id;
      el.innerHTML = `<div class="dot"></div><div class="label">${n.name}</div>`;
      stage.appendChild(el);
      el.addEventListener("mouseenter", ()=>onHover(n));
      el.addEventListener("mouseleave", onHoverEnd);
      el.addEventListener("click", ()=>openItem(n.id));
    }
    el.style.left = (n.x*w)+"px";
    el.style.top  = (n.y*h)+"px";
  }
  drawEdges();
}
function drawEdges(){
  const w = stage.clientWidth, h = stage.clientHeight;
  edgesSvg.innerHTML = EDGES.map(([a,b],i)=>{
    const na = NODES.find(n=>n.id===a), nb = NODES.find(n=>n.id===b);
    if(!na||!nb) return "";
    return `<line class="edge" data-a="${a}" data-b="${b}" x1="${na.x*w}" y1="${na.y*h}" x2="${nb.x*w}" y2="${nb.y*h}"/>`;
  }).join("");
}

// ---- emphasis (hover AND click share this; never sticks after restore) --
function emphasize(id){
  const lit = neighbors(id);
  document.querySelectorAll(".node").forEach(el=>{
    el.classList.toggle("lit", lit.has(el.dataset.id));
    el.classList.toggle("dim", !lit.has(el.dataset.id));
    el.classList.toggle("active", el.dataset.id===id);
  });
  edgesSvg.querySelectorAll(".edge").forEach(e=>{
    const on = (e.dataset.a===id||e.dataset.b===id);
    e.classList.toggle("lit", on); e.classList.toggle("dim", !on);
  });
}
function clearEmphasis(){
  document.querySelectorAll(".node").forEach(el=>el.classList.remove("lit","dim","active"));
  edgesSvg.querySelectorAll(".edge").forEach(e=>e.classList.remove("lit","dim"));
}

// ---- hover = survey (ephemeral) ----------------------------------------
function onHover(n){
  if(openNodeId) return;            // while a panel is open, hover doesn't fight it
  emphasize(n.id);
  const el = nodeEl(n.id);
  preview.style.left = Math.min(el.offsetLeft+16, stage.clientWidth-260)+"px";
  preview.style.top  = Math.min(el.offsetTop+16, stage.clientHeight-150)+"px";
  preview.querySelector(".d").style.background = colorByType[n.type];
  document.getElementById("pv-title").textContent = n.name;
  document.getElementById("pv-body").innerHTML = n.body.replace(/<[^>]+>/g," ").slice(0,180)+"…";
  preview.style.display = "block";
}
function onHoverEnd(){
  if(openNodeId) return;
  clearEmphasis();
  preview.style.display = "none";
}

// ---- click = open (ONE panel for everything) ---------------------------
function openItem(id, opts={}){
  preview.style.display = "none";
  const isRef = id.startsWith("reference:");
  const item = isRef ? REFERENCES.find(r=>r.id===id) : NODES.find(n=>n.id===id);
  if(!item) return;

  // off-graph node brought via search → temporary ego (restore on close)
  if(opts.offGraph){ egoTemporary = true; }

  openNodeId = id;
  if(!isRef){ emphasize(id); }       // entities/sessions: focus IN PLACE, kept while open
  else { clearEmphasis(); }          // references aren't nodes → nothing to focus

  // fill THE panel
  document.getElementById("pn-dot").style.background = colorByType[isRef?"reference":item.type];
  document.getElementById("pn-title").textContent = item.name;
  document.getElementById("pn-sub").textContent = isRef ? "reference" : id;
  const tabs = isRef ? TABS_REFERENCE : TABS_ENTITY;
  const tabsEl = document.getElementById("pn-tabs");
  tabsEl.innerHTML = tabs.map((t,i)=>`<button class="${i===(isRef?0:1)?'on':''}">${t}</button>`).join("");
  document.getElementById("pn-content").innerHTML = item.body;
  panel.classList.add("open");
}

function closePanel(){
  panel.classList.remove("open","wide");
  openNodeId = null;
  clearEmphasis();                   // <-- restores the graph to pre-click state
  egoTemporary = false;
}

document.getElementById("pn-close").addEventListener("click", closePanel);
document.getElementById("pn-wide").addEventListener("click", ()=>panel.classList.toggle("wide"));

// click empty stage = deselect / restore
stage.addEventListener("click", (e)=>{ if(e.target===stage || e.target===edgesSvg){ if(openNodeId) closePanel(); else { clearEmphasis(); preview.style.display="none"; } }});

// ---- search = SAME panel, consistent ------------------------------------
const ALL_SEARCH = [
  { kind:"canonical", id:"topic:reaccion-adversa", title:"Reacción Adversa Vacuna Rabia en Caninos", snip:"entidad consolidada" },
  { kind:"reference", id:"reference:reaccion-adversa-investigacion", title:"reaccion-adversa-…-investigacion", snip:"documento de referencia ingestado" },
];
const search = document.getElementById("search");
search.addEventListener("input", ()=>{
  const q = search.value.trim().toLowerCase();
  if(!q){ results.classList.remove("open"); return; }
  const hits = ALL_SEARCH.filter(r=>r.title.toLowerCase().includes(q)||q.length>0);
  document.getElementById("rh-count").textContent = `Search · ${hits.length} resultados`;
  document.getElementById("results-list").innerHTML = hits.map((r,i)=>
    `<div class="item" data-i="${i}"><span class="kind ${r.kind}">${r.kind}</span><span class="t">${r.title}</span><div class="s">${r.snip}</div></div>`).join("");
  [...document.querySelectorAll("#results-list .item")].forEach((el,i)=>{
    el.addEventListener("click", ()=>{
      const r = hits[i];
      const inGraph = NODES.some(n=>n.id===r.id);
      openItem(r.id, { offGraph: !inGraph && !r.id.startsWith("reference:") });   // SAME panel for every result type
    });
  });
  results.classList.add("open");
});
document.getElementById("results-x").addEventListener("click", ()=>{ results.classList.remove("open"); search.value=""; });

layout();
window.addEventListener("resize", layout);
</script>
</body>
</html>
