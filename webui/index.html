<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="durin web UI — chat with your durin workspace."
      data-i18n-meta="description"
    />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161618" media="(prefers-color-scheme: dark)" />
    <!-- durin favicon: anvil lit by a blue forge flame. Primary is an SVG that
         recolours the anvil for the OS colour scheme via an internal @media rule
         (durin-favicon.svg). A real favicon.ico and PNG variants are fallbacks for
         browsers without SVG-favicon support; the ?v query busts the old cached
         shield favicon. Source SVGs live in docs/assets/. -->
    <link rel="icon" type="image/svg+xml" href="/brand/durin-favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico?v=b1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png?v=b1" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32-dark.png?v=b1" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/brand/durin-logo-dark.png?v=b1" />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #0a0a0a;
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Noto Sans SC",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      html.dark body {
        background: #1a1a1a;
        color: #fafafa;
      }

      .boot-splash {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }

      .boot-splash-inner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 14px;
      }

      html:not(.dark) .boot-splash-inner {
        color: rgba(10, 10, 10, 0.64);
      }

      /* Theme-aware boot logo: dark anvil on the light splash, lightened anvil
         on the dark splash. The .dark class is set by the inline script below
         before this markup paints, so there is no flash of the wrong variant. */
      .boot-logo-dark {
        display: none;
      }
      html.dark .boot-logo-light {
        display: none;
      }
      html.dark .boot-logo-dark {
        display: block;
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: currentColor;
        opacity: 0.75;
        animation: boot-pulse 1s ease-in-out infinite;
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.45;
        }
        50% {
          transform: scale(1);
          opacity: 0.85;
        }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("durin-webui.theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
    <script>
      (function () {
        var localeKey = "durin.locale";
        var copy = {
          en: {
            boot: "Loading durin…",
            description: "durin web UI — chat with your durin workspace."
          },
          "zh-CN": {
            boot: "正在加载 durin…",
            description: "durin Web UI —— 与你的 durin 工作区对话。"
          },
          "zh-TW": {
            boot: "正在載入 durin…",
            description: "durin Web UI —— 與你的 durin 工作區對話。"
          },
          fr: {
            boot: "Chargement de durin…",
            description: "Interface web durin — discutez avec votre espace de travail durin."
          },
          ja: {
            boot: "durin を読み込み中…",
            description: "durin Web UI — durin ワークスペースと会話します。"
          },
          ko: {
            boot: "durin 불러오는 중…",
            description: "durin 웹 UI — durin 작업공간과 대화하세요."
          },
          es: {
            boot: "Cargando durin…",
            description: "Interfaz web de durin: conversa con tu espacio de trabajo de durin."
          },
          vi: {
            boot: "Đang tải durin…",
            description: "Giao diện web durin — trò chuyện với workspace durin của bạn."
          },
          id: {
            boot: "Memuat durin…",
            description: "UI web durin — ngobrol dengan workspace durin Anda."
          }
        };

        function normalizeLocale(input) {
          if (!input) return "en";
          var raw = String(input).trim();
          if (!raw) return "en";
          if (copy[raw]) return raw;
          var lower = raw.toLowerCase();
          if (lower === "zh" || lower.indexOf("zh-cn") === 0 || lower.indexOf("zh-sg") === 0) {
            return "zh-CN";
          }
          if (
            lower.indexOf("zh-tw") === 0 ||
            lower.indexOf("zh-hk") === 0 ||
            lower.indexOf("zh-mo") === 0 ||
            lower.indexOf("zh-hant") === 0
          ) {
            return "zh-TW";
          }
          var base = lower.split("-")[0];
          return copy[base] ? base : "en";
        }

        try {
          var stored = localStorage.getItem(localeKey);
          var detected =
            stored ||
            (navigator.languages && navigator.languages[0]) ||
            navigator.language ||
            "en";
          var locale = normalizeLocale(detected);
          var localized = copy[locale] || copy.en;
          document.documentElement.lang = locale;
          var description = document.querySelector('[data-i18n-meta=\"description\"]');
          if (description) description.setAttribute("content", localized.description);
          var boot = document.querySelector("[data-boot-copy]");
          if (boot) boot.textContent = localized.boot;
        } catch {}
      })();
    </script>
    <title>durin</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash-inner" style="flex-direction: column; gap: 14px;">
          <img
            class="boot-logo-light"
            src="/brand/durin-logo.png"
            alt=""
            aria-hidden="true"
            width="64"
            height="64"
            style="opacity: 0.9;"
          />
          <img
            class="boot-logo-dark"
            src="/brand/durin-logo-dark.png"
            alt=""
            aria-hidden="true"
            width="64"
            height="64"
            style="opacity: 0.9;"
          />
          <div style="display: flex; align-items: center; gap: 10px;">
            <span class="boot-dot" aria-hidden="true"></span>
            <span data-boot-copy>Loading durin…</span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
